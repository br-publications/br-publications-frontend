<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./src/assets/BR_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Preconnect to Google Fonts — establishes connection early but does NOT block render -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load Inter font asynchronously — does NOT block initial paint -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" /></noscript>
    <title>BR Publications | Academic Books & Research</title>
    <meta name="description" content="BR Publications is an academic publisher offering peer-reviewed books, book chapters, and research publications across engineering, science, management, and more." />
    <meta name="keywords" content="academic books, book chapters, peer-reviewed, research publications, engineering books, BR Publications" />
    <meta name="robots" content="index, follow" />
    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BR Publications" />
    <meta property="og:title" content="BR Publications | Academic Books & Research" />
    <meta property="og:description" content="Explore peer-reviewed academic books and research chapters published by BR Publications." />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BR Publications | Academic Books & Research" />
    <meta name="twitter:description" content="Explore peer-reviewed academic books and research chapters published by BR Publications." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
