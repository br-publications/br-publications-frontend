services:
  - type: web
    name: br-publications-frontend
    runtime: static
    buildCommand: npx vite build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://br-publications-backend.onrender.com
      - key: VITE_API_URL
        value: https://br-publications-backend.onrender.com
      - key: VITE_GOOGLE_CLIENT_ID
        value: 475289564338-bjoieqnbf2abi140onried6ao9getu4a.apps.googleusercontent.com
